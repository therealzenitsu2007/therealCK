<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oi&family=Oswald:wght@200..700&display=swap"
            rel="stylesheet" />
        <style>
            body {
                background-image: url("tiktok_z3ddx_7622091851298016514.gif.gif");
                background-size: 15%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: "Oi", serif;
                font-weight: 2;
                font-style: normal;
                color: black;
                font-size: 25px;
                -webkit-text-stroke: 2px white;
                flex-direction: column;
            }
            .oi-regular {
                font-family: "Oi", serif;
                font-weight: 2;
                font-style: normal;
            }
            #video {
                display: none;
                pointer-events: none;
            }
            #nig {
                border: none;
                background-image: linear-gradient(45deg, rgb(85, 0, 255), rgb(0, 89, 255));
                background-size: 150%;
                background-position: left bottom;
                width: 500px;
                height: 300px;
                border-radius: 10px;
                font-size: 75px;
                -webkit-text-stroke: 0.5px white;
                transition-property: width, height, background-position;
                transition-duration: 0.2s;
                transition-timing-function: ease-in-out;
                margin-bottom: 10px;
            }
            #nig:hover {
                cursor: pointer;
                width: 600px;
                height: 350px;
                background-position: right top;
            }
        </style>
    </head>
    <body>
        <h1>CHARLIE CHARLIE CHARLIE CHARLIE CHAR CHAR CHARLIE CHARLIE KIRKY</h1>
        <button id="nig">clickle me</button>
        <video src="CHARLIE CHARLIE KIRKY FUNK.mp4" id="video" width="640" height="360" controls>Your browser does not support the video tag.</video>
        <script>
            let btn = document.getElementById("nig");
            let video = document.getElementById("video");
            btn.addEventListener(
                "click",
                () => {
                    let kirky = new Audio("CHARLIE CHARLIE KIRKY FUNK.mp3");
                    video.style.display = "inline";
                    kirky.play();
                    video.play();
                    btn.style.width = "0px";
                    btn.style.height = "0px";
                    btn.style.fontSize = "0px";
                },
                { once: true },
            );
        </script>
    </body>
</html>
